name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      DIRECT_URL: ${{ secrets.DATABASE_URL_TEST }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: test-cron-secret
      RESEND_API_KEY: re_test_key
      ADMIN_EMAIL: admin@thamyshoes.com.br
      NOTIFICATION_EMAIL_TO: admin@thamyshoes.com.br
      BLING_CLIENT_ID: test-client-id
      BLING_CLIENT_SECRET: test-client-secret
      BLING_REDIRECT_URI: http://localhost:3000/api/bling/callback
      ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      SUPABASE_URL: https://test-project.supabase.co
      SUPABASE_SERVICE_KEY: test-supabase-service-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed test data
        run: npm run seed:test

      - name: Build Next.js
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
